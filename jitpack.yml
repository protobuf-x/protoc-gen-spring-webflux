jdk:
  - openjdk8

install:
  # Build and publish to local Maven repository
  - ./gradlew clean :plugin:build :plugin:publishToMavenLocal -Pversion=$VERSION
  # JitPack doesn't automatically pick up custom classifiers, so we need to ensure they're available
  # Copy OS-specific artifacts to the expected location for JitPack
  - |
    if [ -d ~/.m2/repository/io/github/protobuf-x/plugin/$VERSION ]; then
      mkdir -p ~/.m2/repository/com/github/protobuf-x/protoc-gen-spring-webflux/$VERSION/
      for file in ~/.m2/repository/io/github/protobuf-x/plugin/$VERSION/plugin-$VERSION*.exe; do
        if [ -f "$file" ]; then
          filename=$(basename "$file")
          newname=${filename/plugin-$VERSION/protoc-gen-spring-webflux-$VERSION}
          cp "$file" ~/.m2/repository/com/github/protobuf-x/protoc-gen-spring-webflux/$VERSION/$newname
        fi
      done
    fi