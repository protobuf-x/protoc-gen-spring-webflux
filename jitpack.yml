jdk:
  - openjdk8
install:
  - ./gradlew clean -Pgroup=com.github.protobuf-x -Pversion=$VERSION -xtest assemble publishToMavenLocal
  - mvn install:install-file -Dfile=plugin/build/libs/protoc-gen-spring-webflux-$VERSION-linux-x86_64.exe -DgroupId=com.github.protobuf-x -DartifactId=protoc-gen-spring-webflux -Dversion=$VERSION -Dpackaging=exe -Dclassifier=linux-x86_64 -DgeneratePom=false
  - mvn install:install-file -Dfile=plugin/build/libs/protoc-gen-spring-webflux-$VERSION-osx-x86_64.exe -DgroupId=com.github.protobuf-x -DartifactId=protoc-gen-spring-webflux -Dversion=$VERSION -Dpackaging=exe -Dclassifier=osx-x86_64 -DgeneratePom=false
  - mvn install:install-file -Dfile=plugin/build/libs/protoc-gen-spring-webflux-$VERSION-osx-aarch_64.exe -DgroupId=com.github.protobuf-x -DartifactId=protoc-gen-spring-webflux -Dversion=$VERSION -Dpackaging=exe -Dclassifier=osx-aarch_64 -DgeneratePom=false